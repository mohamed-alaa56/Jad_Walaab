<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل دخول الطالب - جد ولعب</title>
    <link rel="stylesheet" href="student_login.css">
</head>
<body>

<div class="container">

    <h2 class="title">تسجيل دخول الطالب</h2>

    <form id="loginForm">

        <label>اسم الطالب</label>
        <input type="text" id="loginName" placeholder="اكتب اسمك" required>

        <label>الإيميل</label>
        <input type="email" id="loginEmail" placeholder="example@gmail.com" required>

        <label>كلمة المرور</label>
        <input type="password" id="loginPass" placeholder="••••••" required>

        <button type="submit" class="login-btn">تسجيل الدخول</button>

    </form>

    <p class="note">
        ليس لديك حساب؟
        <a href="student_signup.html">إنشاء حساب</a>
    </p>

</div>
<script src="cloud_db.js"></script>
<script src="student_login.js"></script>
    <script>
        initCloud();
    </script> 
</body>

</html>
